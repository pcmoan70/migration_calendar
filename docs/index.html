<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Species &amp; Checklists</title>
  <meta name="description" content="Interactive, in-browser explorer of bird & wildlife distribution and migration patterns, powered by the BirdNET Geomodel running client-side via ONNX Runtime Web." />

  <!-- Leaflet (map) — vendored locally for offline use -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />

  <link rel="stylesheet" href="demo.css" />

  <!-- PWA: installable + offline -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b1f2a" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <header id="site-header">
    <h1 data-i18n="app.title">Species &amp; Checklists</h1>
  </header>

  <!-- demo.js renders the whole interactive app into this mount point -->
  <div id="demo-root"></div>

  <!-- i18n strings + persisted state + analysis views (load before demo.js) -->
  <script src="i18n/strings.js"></script>
  <script src="state.js"></script>
  <script src="analysis.js"></script>

  <!-- Leaflet (vendored locally for offline use) -->
  <script src="vendor/leaflet/leaflet.js"></script>

  <!-- Main app (loads ONNX Runtime Web inside inference-worker.js) -->
  <script src="demo.js"></script>

  <!-- Register the service worker for offline support -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (e) {
          console.warn("Service worker registration failed:", e);
        });
      });
    }
  </script>
</body>
</html>
